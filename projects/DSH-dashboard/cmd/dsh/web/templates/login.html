<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DSH -- Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
<pre>
+--[ DSH Dashboard :: Login ]--------------------------------------+
</pre>
<p><button id="passkeyBtn">[Login with Passkey]</button></p>
<p id="passkeyError" class="error"></p>
<pre>
+------------------------------------------------------------------+
</pre>
</main>
<script>
document.getElementById('passkeyBtn').addEventListener('click', async () => {
  const errEl = document.getElementById('passkeyError');
  errEl.textContent = '';
  try {
    const optRes = await fetch('/auth/passkey/login/begin');
    const options = await optRes.json();
    options.publicKey.challenge = b64ToBuffer(options.publicKey.challenge);
    if (options.publicKey.allowCredentials) {
      options.publicKey.allowCredentials = options.publicKey.allowCredentials.map(c => ({
        ...c, id: b64ToBuffer(c.id)
      }));
    }
    const cred = await navigator.credentials.get(options);
    const body = {
      id: cred.id,
      rawId: bufToB64(cred.rawId),
      type: cred.type,
      response: {
        authenticatorData: bufToB64(cred.response.authenticatorData),
        clientDataJSON: bufToB64(cred.response.clientDataJSON),
        signature: bufToB64(cred.response.signature),
        userHandle: cred.response.userHandle ? bufToB64(cred.response.userHandle) : null,
      }
    };
    const res = await fetch('/auth/passkey/login/finish', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.redirect) { window.location.href = data.redirect; return; }
    errEl.textContent = '! ' + (data.error || 'authentication failed');
  } catch (e) { errEl.textContent = '! ' + e.message; }
});

function b64ToBuffer(b64) {
  return Uint8Array.from(atob(b64.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0)).buffer;
}
function bufToB64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
</script>
</body>
</html>
