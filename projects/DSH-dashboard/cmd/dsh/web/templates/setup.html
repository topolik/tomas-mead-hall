<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DSH -- Setup</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
<pre>
+--[ DSH Dashboard :: First-run Setup ]----------------------------+
</pre>
<p>No passkey registered yet. Register one to get started.</p>
<table>
<tr><td>Passkey name:</td><td><input type="text" id="pkName" placeholder="e.g. MacBook Touch ID" size="30" autofocus></td></tr>
<tr><td></td><td><button id="setupBtn">[Register Passkey]</button></td></tr>
</table>
<p id="setupStatus" class="error"></p>
<pre>
+------------------------------------------------------------------+
</pre>
</main>
<script>
document.getElementById('setupBtn').addEventListener('click', async () => {
  const status = document.getElementById('setupStatus');
  const name = document.getElementById('pkName').value.trim() || 'Passkey';
  status.textContent = '';
  try {
    const tok = new URLSearchParams(window.location.search).get('token');
    const tq = tok ? '?token=' + encodeURIComponent(tok) : '';
    const optRes = await fetch('/setup/passkey/begin' + tq);
    const options = await optRes.json();
    if (options.error) { status.textContent = '! ' + options.error; return; }
    options.publicKey.challenge = b64ToBuffer(options.publicKey.challenge);
    options.publicKey.user.id = b64ToBuffer(options.publicKey.user.id);
    if (options.publicKey.excludeCredentials) {
      options.publicKey.excludeCredentials = options.publicKey.excludeCredentials.map(c => ({...c, id: b64ToBuffer(c.id)}));
    }
    const cred = await navigator.credentials.create(options);
    const body = {id: cred.id, rawId: bufToB64(cred.rawId), type: cred.type, response: {
      attestationObject: bufToB64(cred.response.attestationObject),
      clientDataJSON: bufToB64(cred.response.clientDataJSON),
    }};
    const res = await fetch('/setup/passkey/finish?name=' + encodeURIComponent(name) + (tok ? '&token=' + encodeURIComponent(tok) : ''), {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.redirect) { window.location.href = data.redirect; return; }
    status.textContent = '! ' + (data.error || 'registration failed');
  } catch (e) { status.textContent = '! ' + e.message; }
});

function b64ToBuffer(b64) {
  return Uint8Array.from(atob(b64.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0)).buffer;
}
function bufToB64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
</script>
</body>
</html>
