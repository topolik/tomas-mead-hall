name: gml

services:
  gml:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      GML_RULES: /app/data/rules.yaml
      GML_DSH: /app/data/dsh.yaml
      GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND: file
      LLP_URL: ${LLP_URL:-}
      LLP_SOCKET: ${LLP_SOCKET:-}
      LLP_MODEL: ${LLP_MODEL:-}
    # Credentials are injected via stdin pipe — never written to disk inside the container.
    # Usage (via run-task.sh, which handles the op pipe):
    #   ./run-task.sh analyze --hours 4
    #   ./run-task.sh learn --days 7
    #   ./run-task.sh profile
    #   ./run-task.sh run --dry-run
