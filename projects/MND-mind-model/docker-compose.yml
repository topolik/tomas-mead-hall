name: mnd

services:
  mnd:
    build: .
    # DSH runs on the host (localhost:9090) — GML precedent
    network_mode: host
    # Write as the invoking user so data/ stays user-owned
    # (run-task.sh exports MND_UID/MND_GID).
    user: "${MND_UID:-1000}:${MND_GID:-1000}"
    volumes:
      # Session history — read-only, the pipeline must never touch it (MND-004)
      - ${MND_CLAUDE_DIR:-~/.claude/projects}:/sessions/claude:ro
      - ${MND_GEMINI_DIR:-~/.gemini/tmp}:/sessions/gemini:ro
      # Working data (gitignored) and the distilled brain (committed)
      - ./data:/app/data

  ollama:
    image: ollama/ollama
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama-models:/root/.ollama
    profiles:
      - embed

volumes:
  ollama-models:
